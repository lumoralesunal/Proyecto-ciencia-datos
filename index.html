<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Predicción de Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                
                <div class="card shadow">
                    <div class="card-header bg-danger text-white text-center">
                        <h2>Estimar Tiempo de Entrega</h2>
                    </div>
                    <div class="card-body">
                        <form id="formularioPrediccion">
                            
                            <div class="mb-3">
                                <label class="form-label">Edad del Repartidor</label>
                                <input type="number" id="input_edad" class="form-control" placeholder="Ej: 28">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Calificación del Repartidor (1.0 a 5.0)</label>
                                <input type="number" step="0.1" id="input_calificacion" class="form-control" placeholder="Ej: 4.5">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Tipo de Orden</label>
                                <select id="input_orden" class="form-select">
                                    <option value="Snack">Snack</option>
                                    <option value="Drinks">Drinks</option>
                                    <option value="Buffet">Buffet</option>
                                    <option value="Meal">Meal</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Tipo de Vehículo</label>
                                <select id="input_vehiculo" class="form-select">
                                    <option value="motorcycle">Moto</option>
                                    <option value="scooter">Scooter</option>
                                    <option value="electric_scooter">Scooter Eléctrico</option>
                                    <option value="bycicle">Bicicleta</option>
                                </select>
                            </div>

                            <button type="button" class="btn btn-dark w-100" onclick="simular_prediccion()">Calcular Tiempo Estimado</button>
                        </form>

                        <div id="caja_resultado" class="mt-4 alert alert-success" style="display: none;">
                            <h4 class="text-center" id="texto_resultado"></h4>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
